# Auction Transformer Training Configuration
data:
  dir: generated
  date_start: "2026-03-13"
  date_end: "2026-04-28"
  train_split: 0.95
  train_fraction: 0.90
  max_hours_back: 24
  max_sequence_length: 1024
  bucket_sampling: true  # Group similar-length sequences to reduce padding waste
  num_buckets: 20        # Number of length buckets (only used if bucket_sampling=true)
  prefetch_factor: 8
  preload_memmap: true  # Load all memmap arrays into RAM (~16GB); eliminates I/O bottleneck on servers with 64GB+

training:
  num_epochs: 1
  batch_size: 128
  learning_rate: 3e-5
  use_lr_scheduler: true
  lr_warmup_fraction: 0.1   # Fraction of total steps for linear warmup (0 to disable)
  lr_cosine_annealing: true  # Use cosine annealing; false uses linear decay
  gradient_clip: 1000.0
  precision: bf16
  val_check_interval: 0.1
  limit_val_batches: 5000
  checkpoint_every: 10000
  log_every: 10
  logging_interval: 1000
  num_workers: 4

model:
  pretrained_path: null
  reset_embeddings: false
  input_size: 5
  embedding_dim: 32
  d_model: 256
  dim_feedforward: 1024
  nhead: 16
  num_layers: 4
  dropout: 0.1
  n_buyout_ranks: 64
  n_time_bins: 48              # one hazard per duration hour (0..47); no sink bin
  nll_weight: 1.0              # weight for hazard (nnet-survival) NLL component
  pos_weight: 5.0              # up-weight rare sale events (>1 raises quick-sale recall); 1.0 = off
  rank_weight: 0.0             # weight for DeepHit ranking aux loss (0 = pure nnet-survival)
  deephit_ranking_sigma: 0.1   # kernel bandwidth for ranking loss (pycox sigma)
  c_index_n_samples: 50000     # subsample size for C-index computation (0 = use all)

hardware:
  accelerator: auto
  devices: 1

logging:
  wandb: true
  project: auctions_survival

checkpoint:
  dir: models/
  save_last: true
  save_top_k: -1
